<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ficha de manguera · HydraTech Group</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/hydratech-icon.png">
<meta name="theme-color" content="#141829">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>html,body{margin:0;background:#f1f5f9;font-family:'IBM Plex Sans',system-ui,sans-serif;}</style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
  }
}
</script>
  <script defer src="auth-gate.js"></script>
</head>
<body>
  <div style="background:#141829; border-bottom:3px solid #263370;">
    <div style="max-width:760px; margin:0 auto; padding:10px 18px; display:flex; align-items:center; justify-content:space-between; gap:16px;">
      <a href="acceso.html" style="display:inline-flex; align-items:center; gap:9px; text-decoration:none;">
        <span style="color:#aeb6d4; font-size:18px; line-height:1;">&#8592;</span>
        <img src="assets/hydratech-wordmark-white.png" alt="HydraTech Group" style="height:18px; display:block;">
      </a>
      <span style="font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#5b6390;">Ficha de manguera</span>
    </div>
  </div>

  <div class="mx-auto max-w-[760px] p-4">
    <div id="card" class="rounded-xl border border-slate-200 bg-white p-5 text-[14px] text-slate-700">
      Cargando ficha…
    </div>
  </div>

<script type="module">
// La lógica de precio y catálogo se reutiliza del configurador.
import { DASH, FAM_LABEL, estFor, medFor, angFor, quoteLine } from './configurador.app.js';

const $ = (s) => document.querySelector(s);
const params = new URLSearchParams(location.search);
const c = params.get('c'), m = params.get('m');
const money = (n) => "$" + Number(n).toLocaleString("es-MX", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const norm360 = (a) => ((Math.round(a) % 360) + 360) % 360;

function sideLabel(side) {
  const est = estFor(side.g).find((e) => e.sk === side.sk);
  const med = medFor(side.g, side.sk).find((x) => x.th === side.th);
  const ang = angFor(side.g, side.sk, side.th).find((a) => a[0] === side.ak);
  const parts = [FAM_LABEL[side.g] || side.g, est?.sl || side.sk, med?.ml || side.th];
  if (side.ak !== "R") parts.push(ang ? ang[1] : side.ak);
  return parts.join(" ");
}
const hasCodo = (s) => s.ak !== "R";
function orientTxt(h) {
  const p = [];
  if (hasCodo(h.A)) p.push(`A ${norm360(h.A.or || 0)}°`);
  if (hasCodo(h.B)) p.push(`B ${norm360(h.B.or || 0)}°`);
  if (hasCodo(h.A) && hasCodo(h.B)) p.push(`desfase ${norm360((h.B.or || 0) - (h.A.or || 0))}°`);
  return p.length ? p.join(" · ") + " (ref. curva natural)" : "Sin codos (extremos rectos)";
}
function specTxt(h) {
  let t = `Manguera ⌀${DASH[h.A.th] || h.A.th}" · ${h.len} m · ${h.pres} psi — A: ${sideLabel(h.A)} | B: ${sideLabel(h.B)}`;
  if (hasCodo(h.A) || hasCodo(h.B)) t += ` — Orientación: ${orientTxt(h)}`;
  return t;
}

const row = (k, v) => `<div class="flex justify-between gap-4 border-b border-slate-100 py-1.5">
  <span class="text-slate-400">${k}</span><span class="text-right font-medium">${v}</span></div>`;

async function main() {
  const card = $('#card');
  if (!c || !m) { card.innerHTML = '<span class="text-rose-600">El enlace del QR está incompleto (faltan datos del cliente o de la manguera).</span>'; return; }
  let d;
  try { d = await (await fetch(`/api/manguera-ficha?c=${c}&m=${encodeURIComponent(m)}`)).json(); }
  catch (e) { card.innerHTML = '<span class="text-rose-600">No pude consultar el censo. Revisa tu conexión.</span>'; return; }
  if (!d.ok) { card.innerHTML = `<span class="text-rose-600">${d.error || 'Manguera no encontrada.'}</span>`; return; }

  const h = d.manguera;
  const q = quoteLine({ pres: h.pres, len: h.len, A: h.A, B: h.B });
  const precioHtml = q.error
    ? `<span class="text-rose-600 text-[12px]">${q.error}</span>`
    : `<b>${money(q.customer)}</b> <span class="text-slate-400 text-[12px]">(${q.hose.name}, ${q.sys})</span>`;

  card.innerHTML = `
    <div class="mb-3">
      <div class="font-mono text-2xl font-bold text-slate-800">${h.id}</div>
      <div class="text-[13px] text-slate-500">${d.cliente} · ${d.area} · ${d.equipo}</div>
    </div>
    ${row('Presión de trabajo', h.pres + ' psi')}
    ${row('Largo total', h.len + ' m')}
    ${row('Diámetro', '⌀' + (DASH[h.A.th] || h.A.th) + '"')}
    ${row('Extremo A', sideLabel(h.A))}
    ${row('Extremo B', sideLabel(h.B))}
    ${row('Orientación de codos', orientTxt(h))}
    ${h.notas ? row('Notas', h.notas) : ''}
    ${row('Alta en censo', (h.alta || '—') + (h.tec ? ' · ' + h.tec : ''))}
    <div class="mt-4 flex flex-wrap items-center justify-between gap-3">
      <div class="text-[13px] text-slate-600">Precio lista actual: ${precioHtml}</div>
      <button id="btn-reemplazo" ${q.error ? 'disabled' : ''}
        class="rounded bg-blue-600 px-5 py-2.5 text-[14px] font-bold text-white hover:bg-blue-700 disabled:bg-slate-300">
        Pedir reemplazo
      </button>
    </div>
    <div id="msg" class="mt-3 text-[13px]"></div>`;

  $('#btn-reemplazo')?.addEventListener('click', async (ev) => {
    const btn = ev.currentTarget, msg = $('#msg');
    if (!confirm(`Se creará una cotización en Odoo para ${d.cliente} con el reemplazo de ${h.id}. ¿Continuar?`)) return;
    btn.disabled = true; btn.textContent = 'Creando cotización…'; msg.textContent = '';
    try {
      const r = await fetch('/api/odoo-cotizar', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          partnerId: Number(d.clienteId),
          note: `Reemplazo de manguera censada ${h.id} — ${d.area} · ${d.equipo}`,
          lines: [{ name: `[Reemplazo ${h.id}] ` + specTxt(h), price: q.customer, qty: 1 }],
        }),
      });
      const res = await r.json();
      if (res.ok) {
        msg.innerHTML = `<span class="text-emerald-700">Cotización <b>${res.folio}</b> creada en Odoo.</span> <a class="text-blue-600 underline" href="${res.link}" target="_blank" rel="noopener">Abrir en Odoo</a>`;
        btn.textContent = 'Cotización creada';
      } else {
        msg.innerHTML = `<span class="text-rose-600">${res.error || 'No se pudo crear la cotización.'}</span>`;
        btn.disabled = false; btn.textContent = 'Pedir reemplazo';
      }
    } catch (e) {
      msg.innerHTML = `<span class="text-rose-600">${String(e.message || e)}</span>`;
      btn.disabled = false; btn.textContent = 'Pedir reemplazo';
    }
  });
}
main();
</script>
</body>
</html>
