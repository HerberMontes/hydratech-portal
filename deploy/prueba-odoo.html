<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prueba de conexión Odoo · HydraTech</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/hydratech-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#141829">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HydraTech">
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(function(){});}</script>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{margin:0; min-height:100vh; font-family:'IBM Plex Sans',system-ui,sans-serif; color:#1b2138; background:#f3f5fa; padding:28px;}
  .wrap{max-width:900px; margin:0 auto;}
  a.back{color:#5a647d; font-size:13px; font-weight:600; text-decoration:none;}
  h1{font-family:'Archivo',sans-serif; font-weight:800; font-size:26px; margin:14px 0 4px; color:#263370;}
  p.sub{color:#5a647d; font-size:14px; margin:0 0 20px;}
  .card{background:#fff; border:1px solid #e3e8f1; border-radius:12px; padding:18px; margin-bottom:16px;}
  label{display:block; font-size:12px; font-weight:600; color:#404a63; margin-bottom:5px;}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;}
  input{flex:1; min-width:180px; border:1px solid #e3e8f1; border-radius:8px; padding:9px 11px; font-size:14px; font-family:inherit; color:#1b2138;}
  input:focus{outline:none; border-color:#263370;}
  button{background:#263370; color:#fff; border:0; border-radius:8px; padding:10px 18px; font-size:14px; font-weight:700; cursor:pointer;}
  button:hover{background:#1c2858;}
  .status{font-family:'IBM Plex Mono',monospace; font-size:13px; padding:10px 12px; border-radius:8px; margin-top:14px;}
  .ok{background:#e7f6ec; color:#1f7a44; border:1px solid #bce3c9;}
  .err{background:#fdecec; color:#b4232a; border:1px solid #f3c4c4;}
  .muted{color:#8a93a8;}
  table{width:100%; border-collapse:collapse; font-size:13px; margin-top:8px;}
  th,td{text-align:left; padding:7px 8px; border-bottom:1px solid #eef1f6;}
  th{font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:#8a93a8;}
  td.mono{font-family:'IBM Plex Mono',monospace;}
  td.num{text-align:right; font-variant-numeric:tabular-nums;}
</style>
  <script defer src="auth-gate.js"></script>
</head>
<body>
<div class="wrap">
  <a class="back" href="acceso.html">&#8592; Volver a herramientas</a>
  <h1>Prueba de conexión con Odoo</h1>
  <p class="sub">Verifica que las funciones de Netlify se conectan a tu Odoo y traen productos con precios. Aún no toca el configurador.</p>

  <div class="card">
    <div class="row">
      <div style="flex:2;">
        <label>Buscar producto (nombre o código). Vacío = primeros resultados.</label>
        <input id="q" placeholder="p. ej. 210.040 o manguera">
      </div>
      <div style="flex:1;">
        <label>Token del portal (si configuraste PORTAL_TOKEN)</label>
        <input id="tok" placeholder="opcional">
      </div>
      <button id="go">Probar</button>
    </div>
    <div id="status" class="status muted">Sin probar todavía.</div>
  </div>

  <div class="card" id="resultsCard" style="display:none;">
    <div id="meta" class="muted" style="font-size:13px; margin-bottom:6px;"></div>
    <table>
      <thead><tr><th>Código</th><th>Producto</th><th style="text-align:right;">Precio venta</th><th style="text-align:right;">Costo</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  async function probar() {
    const q = $("q").value.trim();
    const tok = $("tok").value.trim();
    $("status").className = "status muted";
    $("status").textContent = "Consultando…";
    try {
      const headers = {};
      if (tok) headers["x-portal-token"] = tok;
      const r = await fetch("/api/odoo-products?limit=50&q=" + encodeURIComponent(q), { headers });
      const data = await r.json();
      if (!data.ok) throw new Error(data.error || ("HTTP " + r.status));
      $("status").className = "status ok";
      $("status").textContent = "✓ Conexión correcta. " + data.count + " producto(s).";
      $("resultsCard").style.display = "block";
      $("meta").textContent = "Mostrando " + data.count + " resultado(s).";
      $("rows").innerHTML = data.products.map(p =>
        "<tr><td class='mono'>" + (p.default_code || "—") + "</td><td>" + (p.name || "") +
        "</td><td class='num'>$" + Number(p.list_price||0).toLocaleString("es-MX",{minimumFractionDigits:2}) +
        "</td><td class='num'>$" + Number(p.standard_price||0).toLocaleString("es-MX",{minimumFractionDigits:2}) + "</td></tr>"
      ).join("");
    } catch (e) {
      $("status").className = "status err";
      $("status").textContent = "✗ " + (e.message || e);
      $("resultsCard").style.display = "none";
    }
  }
  $("go").addEventListener("click", probar);
  $("q").addEventListener("keydown", (e) => { if (e.key === "Enter") probar(); });
</script>
</body>
</html>
