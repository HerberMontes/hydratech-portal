<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRM · Reporte semanal · HydraTech Group</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/hydratech-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#eef0f4;font-family:'IBM Plex Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:#1b2138}
  .mono{font-family:'IBM Plex Mono',monospace}

  /* barra HydraTech */
  #ht-bar{background:#141829;border-bottom:3px solid #263370}
  .ht-bar-in{max-width:980px;margin:0 auto;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .ht-back{display:inline-flex;align-items:center;gap:9px;text-decoration:none;color:#aeb6d4}
  .ht-back img{height:18px;display:block}
  .ht-back .wm{display:none;color:#fff;font-family:'Archivo',sans-serif;font-weight:800;font-size:15px}
  .ht-tool{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#5b6390}

  /* controles (no se imprimen) */
  .controls{max-width:980px;margin:0 auto;padding:16px 18px;display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
  .controls .f{display:flex;flex-direction:column;gap:5px}
  .controls label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#717a90}
  .controls select{font:inherit;font-size:14px;background:#fff;border:1.5px solid #d8deea;border-radius:9px;padding:9px 12px;color:#1b2138;min-width:190px}
  .controls select:focus{outline:none;border-color:#263370;box-shadow:0 0 0 3px rgba(38,51,112,.12)}
  .controls .spacer{margin-left:auto}
  .btn{font:inherit;font-weight:600;font-size:13.5px;border:0;border-radius:9px;padding:10px 18px;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
  .btn svg{width:15px;height:15px}
  .btn-primary{background:#263370;color:#fff}
  .btn-primary:hover{background:#1b2447}
  .btn-ghost{background:#fff;border:1.5px solid #d8deea;color:#4a5267}
  .btn-ghost:hover{border-color:#263370;color:#263370}

  /* hoja */
  .sheet-wrap{display:flex;justify-content:center;padding:6px 16px 40px}
  .sheet{width:816px;max-width:100%;min-height:1056px;background:#fff;box-shadow:0 8px 40px rgba(27,33,56,.10);padding:26px 44px 20px;color:#1b2138}

  @media print{
    @page{size:letter;margin:0}
    body{background:#fff}
    #ht-bar,.controls{display:none!important}
    .sheet-wrap{padding:0}
    .sheet{box-shadow:none;width:100%;min-height:auto}
  }
  @media(max-width:840px){
    .sheet{padding:22px 18px}
  }
</style>

<script>window.REQUIRE_ROLE="crm-gerencia";</script>
<script defer src="auth-gate.js"></script>
</head>
<body>

<div id="ht-bar">
  <div class="ht-bar-in">
    <a class="ht-back" href="acceso.html">
      <span style="font-size:18px;line-height:1;">&#8592;</span>
      <img src="assets/hydratech-wordmark-white.png" alt="HydraTech Group" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
      <span class="wm">HydraTech</span>
    </a>
    <span class="ht-tool">CRM · Reporte semanal</span>
  </div>
</div>

<div class="controls">
  <div class="f">
    <label>Vista</label>
    <select id="sel-vista" onchange="cambiarVista()">
      <option value="oportunidades">Oportunidades (comercial)</option>
      <option value="prospectos">Prospectos (embudo de leads)</option>
    </select>
  </div>
  <div class="f">
    <label>Vendedor</label>
    <select id="sel-vendedor" onchange="cargar()"></select>
  </div>
  <div class="f">
    <label>Semana</label>
    <select id="sel-semana" onchange="cargar()"></select>
  </div>
  <div class="spacer"></div>
  <button class="btn btn-ghost" onclick="cargar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.65 4.36A9 9 0 0 0 20.5 15"/></svg>Actualizar</button>
  <button class="btn btn-primary" onclick="window.print()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>Descargar PDF</button>
</div>

<div class="sheet-wrap">
  <div class="sheet" id="sheet"><!-- render por JS --></div>
</div>

<script>
  /* ============================================================
     utilidades
  ============================================================ */
  const esc = s => String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
  const MONO = "'IBM Plex Mono',monospace", ARCH = "'Archivo',sans-serif";
  const INK="#1b2138", SUB="#4a5267", MU="#717a90", NAVY="#263370",
        GREEN="#16a34a", GOLD="#c9a14a", RED="#e5484d", LN="#e6e9f0";
  const MESES=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  function hoyFmt(){ const d=new Date(); return d.getDate()+" "+MESES[d.getMonth()]+" "+d.getFullYear(); }
  function isoWeek(d){ const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const dn=t.getUTCDay()||7; t.setUTCDate(t.getUTCDate()+4-dn); const ys=new Date(Date.UTC(t.getUTCFullYear(),0,1)); return Math.ceil((((t-ys)/86400000)+1)/7); }

  /* ============================================================
     PLANTILLA 1 · Reporte semanal comercial (vista OPORTUNIDADES)
     Fuente: /api/odoo-crm-reporte
  ============================================================ */
  const SAMPLE_COMERCIAL = {
    vendedor:"Roberto Cavazos Treviño", equipo:"Equipo Industrial", rol:"Ejecutivo de cuenta sr.",
    semana:"27", rango:"29 jun – 5 jul 2026", estado:"requiere",
    pipeline:{ abiertoFmt:"$4.82M", abiertoExacto:"$4,820,000 MXN", opps:18, promedioFmt:"$268K", meta:6000000, cobertura:2.4 },
    seguimiento:[
      {cliente:"Minera Peñoles · Mantenimiento", montoFmt:"$420,000", etapa:"Por cotizar", dias:9},
      {cliente:"Aceros del Norte S.A.", montoFmt:"$680,000", etapa:"Cotización enviada", dias:7},
      {cliente:"CEMEX · Planta García", montoFmt:"$310,000", etapa:"Cotización enviada", dias:5},
      {cliente:"Frigorífico Monterrey", montoFmt:"$155,000", etapa:"Nuevo", dias:4},
    ],
    riesgoTotalFmt:"$1,565,000",
    etapas:[
      {nombre:"Por cotizar", opps:7, montoFmt:"$1.94M", pct:100, edadProm:11, salud:"atorado"},
      {nombre:"Cotización enviada", opps:5, montoFmt:"$1.70M", pct:88, edadProm:8, salud:"vigilar"},
      {nombre:"Nuevo", opps:6, montoFmt:"$1.18M", pct:61, edadProm:3, salud:"sano"},
    ],
    act:{llamadas:34, reuniones:6, avances:22, nuevas:5},
    res:{ganadas:3, cierre:27, montoCerradoFmt:"$612,000"},
    sinPaso:2, vencidas:3,
    generado:"HydraTech CRM",
  };

  function renderComercial(d){
    d = d || SAMPLE_COMERCIAL;
    const p = d.pipeline||{}, act = d.act||{}, res = d.res||{};
    const seg = Array.isArray(d.seguimiento)?d.seguimiento:[];
    const aldia = d.estado==="aldia";
    const est = aldia
      ? {t:"Al día", col:GREEN, bg:"#eef7f1", bd:"#cfe8d9"}
      : {t:"Requiere atención", col:"#8a6a1f", dot:GOLD, bg:"#fdf4e3", bd:"#e7d5a6"};

    const card=(inner)=>'<div style="border:1px solid '+LN+';border-radius:14px;padding:13px 16px;box-shadow:0 1px 2px rgba(27,33,56,.04)">'+inner+'</div>';
    const kicker=(t)=>'<div style="font-family:'+MONO+';font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:'+MU+'">'+t+'</div>';

    /* --- 01 salud del pipeline --- */
    let card3;
    if(p.cobertura!=null && p.meta){
      const pct = Math.min(100, Math.round(p.cobertura/3*100));
      const covCol = p.cobertura>=3?GREEN:(p.cobertura>=2?GOLD:RED);
      const faltan = p.meta*3 - (p.abierto||0);
      card3 = card(
        '<div style="display:flex;justify-content:space-between;align-items:baseline">'+kicker("Cobertura vs. meta")+
          '<div style="font-family:'+ARCH+';font-weight:800;font-size:20px;color:'+covCol+'">'+p.cobertura+'x <span style="font-family:\'IBM Plex Sans\';font-weight:500;font-size:12px;color:'+MU+'">de 3x</span></div></div>'+
        '<div style="height:10px;border-radius:6px;background:#eef0f4;margin-top:10px;position:relative;overflow:hidden"><div style="position:absolute;inset:0 '+(100-pct)+'% 0 0;background:'+covCol+';border-radius:6px"></div></div>'+
        '<div style="display:flex;justify-content:space-between;font-family:'+MONO+';font-size:10px;color:'+MU+';margin-top:6px"><span>Actual</span><span style="color:'+SUB+'">Meta recomendada 3.0x &#9656;</span></div>'+
        (p.cobertura<3
          ?'<div style="font-size:11.5px;color:#8a6a1f;margin-top:8px">Va corto: faltan ~'+esc(fmtCompact(faltan))+' de pipeline para cubrir el 3x.</div>'
          :'<div style="font-size:11.5px;color:'+GREEN+';margin-top:8px">Cobertura sana: el pipeline cubre la meta recomendada.</div>')
      );
    }else{
      card3 = card(
        kicker("Ganado esta semana")+
        '<div style="font-family:'+ARCH+';font-weight:800;font-size:26px;color:'+GREEN+';margin-top:6px;line-height:1">'+esc(res.montoCerradoFmt||"$0")+'</div>'+
        '<div style="font-size:12px;color:'+SUB+';margin-top:4px">'+(res.ganadas||0)+' oportunidad'+((res.ganadas||0)===1?'':'es')+' ganada'+((res.ganadas||0)===1?'':'s')+' · tasa de cierre '+(res.cierre||0)+'%</div>'
      );
    }

    /* --- 02 requiere seguimiento --- */
    let segHtml;
    if(seg.length){
      const rows = seg.map((o,i)=>{
        const diasCol = o.dias>=7?RED:GOLD;
        return '<div style="display:grid;grid-template-columns:2fr 1fr 1.4fr 1.2fr;gap:8px;align-items:center;padding:8px 0;'+(i<seg.length-1?'border-bottom:1px solid #f6d4d5;':'')+'">'+
          '<span style="font-weight:600;color:'+INK+';font-size:13.5px">'+esc(o.cliente)+'</span>'+
          '<span style="font-family:'+ARCH+';font-weight:700;color:'+INK+';font-size:13.5px">'+esc(o.montoFmt)+'</span>'+
          '<span style="font-size:12px;color:'+SUB+'">'+esc(o.etapa)+'</span>'+
          '<span style="text-align:right;font-family:'+ARCH+';font-weight:800;color:'+diasCol+';font-size:14px">'+o.dias+' d&iacute;as</span></div>';
      }).join("");
      segHtml =
      '<div style="margin-top:14px;border:1.5px solid #f2c0c1;border-radius:14px;background:#fdf3f3;overflow:hidden">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 18px;background:'+RED+'">'+
          '<div style="font-family:'+ARCH+';font-weight:800;font-size:15px;letter-spacing:.02em;color:#fff">&#9873; REQUIERE SEGUIMIENTO</div>'+
          '<div style="font-family:'+MONO+';font-size:11px;color:#ffe0e0;letter-spacing:.08em">'+seg.length+' oportunidades · '+esc(d.riesgoTotalFmt||"")+' en riesgo</div>'+
        '</div>'+
        '<div style="padding:6px 18px 12px">'+
          '<div style="display:grid;grid-template-columns:2fr 1fr 1.4fr 1.2fr;gap:8px;font-family:'+MONO+';font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:#a15458;padding:10px 0 8px;border-bottom:1px solid #f2c0c1"><span>Cliente</span><span>Monto</span><span>Etapa</span><span style="text-align:right">Sin seguimiento</span></div>'+
          rows+
        '</div></div>';
    }else{
      segHtml =
      '<div style="margin-top:14px;border:1.5px solid #cfe8d9;border-radius:14px;background:#f2faf5;padding:14px 18px;display:flex;align-items:center;gap:10px">'+
        '<span style="width:9px;height:9px;border-radius:50%;background:'+GREEN+';display:inline-block"></span>'+
        '<span style="font-family:'+ARCH+';font-weight:700;font-size:14px;color:'+GREEN+'">Sin oportunidades en riesgo</span>'+
        '<span style="font-size:12px;color:'+SUB+'">Todas las oportunidades abiertas tienen seguimiento reciente.</span></div>';
    }

    /* --- 03 dónde está parado --- */
    const SALUD={sano:{c:GREEN,t:"sano"},vigilar:{c:GOLD,t:"vigilar"},atorado:{c:RED,t:"atorado"}};
    const etapas=(d.etapas||[]).map(e=>{
      const s=SALUD[e.salud]||SALUD.sano;
      return card(
        '<div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-family:'+ARCH+';font-weight:700;font-size:14px;color:'+INK+'">'+esc(e.nombre)+'</span><span style="font-family:'+MONO+';font-size:11px;color:'+MU+'">'+e.opps+' opps</span></div>'+
        '<div style="font-family:'+ARCH+';font-weight:800;font-size:20px;color:'+NAVY+';margin-top:6px">'+esc(e.montoFmt)+'</div>'+
        '<div style="height:7px;border-radius:5px;background:#eef0f4;margin-top:8px;overflow:hidden"><div style="width:'+(e.pct||0)+'%;height:100%;background:'+NAVY+';border-radius:5px"></div></div>'+
        '<div style="font-family:'+MONO+';font-size:10.5px;color:'+s.c+';margin-top:7px">Antig&uuml;edad prom. '+e.edadProm+' d&iacute;as · '+s.t+'</div>'
      );
    }).join("");

    /* --- 05 coaching (generado a partir de datos) --- */
    const alerts=[];
    const rojos = seg.filter(o=>o.dias>=7).length;
    if(rojos) alerts.push({c:RED, t:rojos+' trato'+(rojos>1?'s llevan':' lleva')+' 7+ d&iacute;as sin seguimiento — retomar contacto antes del mi&eacute;rcoles.'});
    if(p.cobertura!=null && p.cobertura<3) alerts.push({c:GOLD, t:'Cobertura '+p.cobertura+'x bajo el 3x recomendado — prospectar cuentas nuevas esta semana.'});
    if(d.sinPaso>0) alerts.push({c:GOLD, t:d.sinPaso+' oportunidad'+(d.sinPaso>1?'es':'')+' sin siguiente paso agendado — definir la pr&oacute;xima acci&oacute;n de cada una.'});
    if(d.vencidas>0) alerts.push({c:RED, t:d.vencidas+' actividad'+(d.vencidas>1?'es':'')+' vencida'+(d.vencidas>1?'s':'')+' en el CRM — cerrarlas o reagendarlas.'});
    const toques=(act.llamadas||0)+(act.reuniones||0);
    alerts.push({c:GREEN, t:(alerts.length?'Ritmo de actividad: ':'Buen ritmo de actividad: ')+toques+' toques y '+(act.avances||0)+' avances registrados esta semana.'});
    const coaching = alerts.slice(0,3).map((a,i)=>
      '<div style="display:flex;gap:9px;align-items:flex-start;'+(i<2?'margin-bottom:6px;':'')+'">'+
        '<span style="width:7px;height:7px;border-radius:50%;background:'+a.c+';margin-top:5px;flex-shrink:0"></span>'+
        '<span style="font-size:12.5px;color:'+INK+';line-height:1.4">'+a.t+'</span></div>').join("");

    document.getElementById("sheet").innerHTML =
    /* encabezado */
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:12px;border-bottom:2px solid '+NAVY+'">'+
      '<div>'+
        '<div style="display:flex;align-items:center;gap:10px">'+
          '<div style="width:26px;height:26px;border-radius:7px;background:'+NAVY+';display:flex;align-items:center;justify-content:center;color:#fff;font-family:'+ARCH+';font-weight:800;font-size:15px">H</div>'+
          '<div style="font-family:'+MONO+';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:'+MU+'">HydraTech Group · Reporte semanal comercial</div></div>'+
        '<div style="font-family:'+ARCH+';font-weight:800;font-size:31px;line-height:1.05;margin-top:10px;color:'+INK+'">'+esc(d.vendedor)+'</div>'+
        '<div style="font-family:'+MONO+';font-size:12px;letter-spacing:.08em;color:'+SUB+';margin-top:6px">Semana '+esc(d.semana)+' · '+esc(d.rango)+(d.equipo&&d.equipo!=="—"?' · '+esc(d.equipo):'')+'</div>'+
      '</div>'+
      '<div style="text-align:right">'+
        '<div style="font-family:'+MONO+';font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:'+MU+';margin-bottom:8px">Estado</div>'+
        '<div style="display:inline-flex;align-items:center;gap:8px;background:'+est.bg+';border:1px solid '+est.bd+';color:'+est.col+';border-radius:999px;padding:8px 14px;font-family:'+ARCH+';font-weight:700;font-size:14px">'+
          '<span style="width:9px;height:9px;border-radius:50%;background:'+(est.dot||est.col)+';display:inline-block"></span>'+est.t+'</div>'+
      '</div></div>'+

    /* 01 */
    '<div style="margin-top:14px">'+
      '<div style="font-family:'+MONO+';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:'+MU+';margin-bottom:9px">01 · Salud del pipeline</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr 1.5fr;gap:14px">'+
        card(kicker("Pipeline abierto")+'<div style="font-family:'+ARCH+';font-weight:800;font-size:26px;color:'+NAVY+';margin-top:6px;line-height:1">'+esc(p.abiertoFmt||"$0")+'</div><div style="font-size:12px;color:'+SUB+';margin-top:4px">'+esc(p.abiertoExacto||"")+'</div>')+
        card(kicker("Oportunidades activas")+'<div style="font-family:'+ARCH+';font-weight:800;font-size:26px;color:'+INK+';margin-top:6px;line-height:1">'+(p.opps||0)+'</div><div style="font-size:12px;color:'+SUB+';margin-top:4px">Monto prom. '+esc(p.promedioFmt||"$0")+'</div>')+
        card3+
      '</div></div>'+

    /* 02 */
    segHtml+

    /* 03 */
    '<div style="margin-top:14px">'+
      '<div style="font-family:'+MONO+';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:'+MU+';margin-bottom:9px">03 · D&oacute;nde est&aacute; parado el pipeline</div>'+
      '<div style="display:grid;grid-template-columns:repeat('+Math.max(1,(d.etapas||[]).length)+',1fr);gap:14px">'+ (etapas||'<div style="font-size:12px;color:'+MU+'">Sin oportunidades abiertas.</div>') +'</div>'+
    '</div>'+

    /* 04 */
    '<div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:14px">'+
      '<div style="border:1px solid #d3dbf0;border-radius:14px;padding:13px 18px;background:#f6f8fd">'+
        '<div style="font-family:'+MONO+';font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:'+NAVY+';margin-bottom:9px">04a · Actividad</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:11px 10px">'+
          '<div><div style="font-family:'+ARCH+';font-weight:800;font-size:22px;color:'+NAVY+'">'+(act.llamadas||0)+'</div><div style="font-size:11.5px;color:'+SUB+'">Llamadas</div></div>'+
          '<div><div style="font-family:'+ARCH+';font-weight:800;font-size:22px;color:'+NAVY+'">'+(act.reuniones||0)+'</div><div style="font-size:11.5px;color:'+SUB+'">Reuniones</div></div>'+
          '<div><div style="font-family:'+ARCH+';font-weight:800;font-size:22px;color:'+NAVY+'">'+(act.avances||0)+'</div><div style="font-size:11.5px;color:'+SUB+'">Avances registrados</div></div>'+
          '<div><div style="font-family:'+ARCH+';font-weight:800;font-size:22px;color:'+NAVY+'">'+(act.nuevas||0)+'</div><div style="font-size:11.5px;color:'+SUB+'">Oportunidades nuevas</div></div>'+
        '</div></div>'+
      '<div style="border:1px solid #bfe4cd;border-radius:14px;padding:13px 18px;background:#f2faf5">'+
        '<div style="font-family:'+MONO+';font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:'+GREEN+';margin-bottom:9px">04b · Resultado</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:11px 10px">'+
          '<div><div style="font-family:'+ARCH+';font-weight:800;font-size:22px;color:'+GREEN+'">'+(res.ganadas||0)+'</div><div style="font-size:11.5px;color:'+SUB+'">Oportunidades ganadas</div></div>'+
          '<div><div style="font-family:'+ARCH+';font-weight:800;font-size:22px;color:'+GREEN+'">'+(res.cierre||0)+'%</div><div style="font-size:11.5px;color:'+SUB+'">Tasa de cierre</div></div>'+
          '<div style="grid-column:1 / -1"><div style="font-family:'+ARCH+';font-weight:800;font-size:22px;color:'+GREEN+'">'+esc(res.montoCerradoFmt||"$0")+'</div><div style="font-size:11.5px;color:'+SUB+'">Monto cerrado MXN</div></div>'+
        '</div></div>'+
    '</div>'+

    /* 05 */

  function fmtCompact(n){
    n=Number(n)||0;
    if(n>=1e6) return "$"+(n/1e6).toFixed(1).replace(/\.0$/,"")+"M";
    if(n>=1e3) return "$"+Math.round(n/1e3)+"K";
    return "$"+Math.round(n);
  }

  /* ============================================================
     carga de datos desde Odoo (con fallback a ejemplo)
  ============================================================ */
  function cambiarVista(){ cargar(); }

  async function cargar(){
    const vista = document.getElementById("sel-vista").value;
    const vs = document.getElementById("sel-vendedor");
    const nombreVend = vs.options[vs.selectedIndex] ? vs.options[vs.selectedIndex].textContent : "";
    const w = document.getElementById("sel-semana").value || String(isoWeek(new Date()));

    if(vista==="prospectos"){
      // el embudo usa OFFSET de semana (0 = en curso) y filtra por NOMBRE de vendedor
      const offset = Math.max(0, isoWeek(new Date()) - (parseInt(w,10)||0));
      const params = new URLSearchParams();
      if(nombreVend) params.set("vendedor", nombreVend);
      params.set("semana", offset);
      if(offset===0) params.set("curso","1"); // semana en curso: días corridos
      try{
        const res = await fetch("/api/odoo-crm-embudo?"+params.toString());
        const d = await res.json();
        if(d && d.ok){ renderProspeccion(d); return; }
        renderProspeccion(SAMPLE_EMBUDO);
      }catch(e){ renderProspeccion(SAMPLE_EMBUDO); }
      return;
    }

    // vista comercial (oportunidades)
    const v = vs.value || "";
    try{
      const res = await fetch("/api/odoo-crm-reporte?vendedor="+encodeURIComponent(v)+"&semana="+encodeURIComponent(w));
      const d = await res.json();
      if(d && d.ok && d.reporte){ renderComercial(d.reporte); return; }
      renderComercial(SAMPLE_COMERCIAL);
    }catch(e){
      renderComercial(SAMPLE_COMERCIAL);
    }
  }

  function initControls(){
    // Semanas: la actual y las 7 previas, calculadas por fecha.
    const ws = document.getElementById("sel-semana");
    const cur = isoWeek(new Date());
    for(let n=cur;n>=Math.max(1,cur-7);n--){const o=document.createElement("option");o.value=n;o.textContent="Semana "+n+(n===cur?" (en curso)":"");ws.appendChild(o);}
    // Vendedores desde Odoo (misma función que el cotizador). Fallback a ejemplo.
    const vs = document.getElementById("sel-vendedor");
    fetch("/api/odoo-empleados").then(r=>r.json()).then(d=>{
      if(d&&d.ok&&Array.isArray(d.empleados)&&d.empleados.length){
        d.empleados.forEach(e=>{const o=document.createElement("option");o.value=e.id;o.textContent=e.name;vs.appendChild(o);});
      }else{const o=document.createElement("option");o.value="";o.textContent=SAMPLE_COMERCIAL.vendedor;vs.appendChild(o);}
      cargar();
    }).catch(()=>{const o=document.createElement("option");o.value="";o.textContent=SAMPLE_COMERCIAL.vendedor;vs.appendChild(o);cargar();});
  }

  initControls();
