<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reporte de servicio · Firma</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/hydratech-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  body{margin:0; background:#e9edf3; font-family:'IBM Plex Sans',system-ui,sans-serif; color:#1b2138;}
  .appbar{position:sticky; top:0; z-index:30; background:#141829; border-bottom:3px solid #263370;}
  .appbar .in{max-width:900px; margin:0 auto; padding:9px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .appbar img{height:17px; display:block;}
  .appbar .tag{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#5b6390;}
  .wrap{max-width:900px; margin:0 auto; padding:16px;}
  .bar{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:14px;}
  .btn{border:0; border-radius:9px; padding:11px 16px; font-size:14px; font-weight:700; cursor:pointer;}
  .primary{background:#263370; color:#fff;} .primary:disabled{opacity:.5; cursor:default;}
  .ghost{background:#fff; color:#263370; border:1px solid #dfe4ee;}
  .status{font-family:'IBM Plex Mono',monospace; font-size:12px; color:#8a93a8;} .status.err{color:#b4232a;}
  .ok{background:#eafaf0; border:1px solid #bde5cc; color:#166534; border-radius:10px; padding:13px 16px; font-weight:600;}
  /* ===== Escenario del reporte (misma hoja del portal) ===== */
  #stage{width:100%;}
  #preview{width:816px; margin:0 auto; display:flex; flex-direction:column; align-items:center; gap:24px;}
  .gal{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px;}
  .gal figure{margin:0; border-radius:9px; overflow:hidden; border:1px solid #e2e7f0; background:#eef2f8;}
  .gal img{width:100%; height:1.55in; object-fit:cover; display:block;}
  .gal figcaption{font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.04em; color:#5a647d; padding:6px 9px; background:#fff; border-top:1px solid #eef1f7;}
  h1,h2,h3,h4{text-wrap:balance;} p,li{text-wrap:pretty;}
  /* ===== Firma ===== */
  .firmaCard{background:#fff; border:1px solid #dfe4ee; border-radius:14px; padding:16px; margin:18px auto 40px; max-width:640px;}
  .firmaCard h2{font-family:'Archivo',sans-serif; font-weight:800; font-size:14px; text-transform:uppercase; letter-spacing:0.05em; color:#263370; margin:2px 0 10px;}
  label{display:block; font-size:12px; font-weight:600; color:#404a63; margin:10px 0 5px;}
  input{width:100%; border:1px solid #dfe4ee; border-radius:8px; padding:10px 11px; font-size:15px; font-family:inherit;}
  canvas{width:100%; height:180px; border:2px dashed #c7cfdf; border-radius:10px; background:#fcfdff; touch-action:none; display:block;}
  @page{ size:letter; margin:0; }
  @media print{
    html{-webkit-print-color-adjust:exact; print-color-adjust:exact;}
    html,body{margin:0; padding:0; background:#fff;}
    .appbar,.bar,.firmaCard,.noprint{display:none !important;}
    #stage{height:auto !important; overflow:visible !important; width:auto !important;}
    #preview{transform:none !important; width:auto !important; margin:0 !important;}
    .wrap{padding:0 !important; max-width:none !important;}
    .sheet{box-shadow:none !important; margin:0 !important; border-radius:0 !important;}
    .cover{width:100% !important; height:100vh !important; min-height:0 !important; overflow:hidden;}
    .doc{max-width:none !important; margin:0 !important; padding:0 0.75in !important; box-shadow:none !important;}
    .pbreak{break-before:page;} .avoid{break-inside:avoid;} .gal figure{break-inside:avoid;}
  }
</style>
</head>
<body>
<div class="appbar"><div class="in">
  <img id="logo" src="assets/hydratech-wordmark-white.png" alt="Logo">
  <span class="tag">Reporte de servicio</span>
</div></div>
<div class="wrap">
  <div class="bar noprint">
    <button class="btn ghost" id="pdf" style="display:none;">⤓ Descargar PDF</button>
    <span class="status" id="topStatus">Cargando reporte…</span>
  </div>
  <div id="stage"><div id="preview"></div></div>

  <div class="firmaCard" id="firmaCard" style="display:none;">
    <h2>Firma de conformidad del cliente</h2>
    <label>Nombre de quien recibe</label>
    <input id="firmante" placeholder="Nombre y apellido" autocomplete="name">
    <label>Firme dentro del recuadro</label>
    <canvas id="pad"></canvas>
    <div class="bar" style="margin-top:12px;">
      <button class="btn ghost" id="limpiar">Borrar</button>
      <button class="btn primary" id="firmar" disabled>Firmar y archivar</button>
      <span class="status" id="st">Al firmar, acepta que el servicio descrito fue realizado.</span>
    </div>
  </div>
  <div class="firmaCard ok" id="yaFirmado" style="display:none;"></div>
</div>
<script src="reporte-render.js"></script>
<script>
const p = new URLSearchParams(location.search);
const id = p.get("id"), t = p.get("t");
const $ = (x) => document.getElementById(x);
let REP = null;

function pinta(rep){
  if(rep.brand === "tubemac"){ $("logo").src = "assets/tubemac/tubemac-logo-white.png"; document.title = "Reporte de servicio · Tube-Mac"; }
  const d = { cliente:rep.cliente, planta:rep.planta, tipo:rep.tipo, folio:rep.folio, fecha:rep.fecha, tecnicos:rep.tecnicos||[] };
  $("preview").innerHTML = renderReport(rep.brand||"hydratech", d, rep.content||{}, rep.images||[], rep.coverPhoto||null, rep.firma||null);
  $("pdf").style.display = "inline-block";
  fitPreview();
}

async function cargar(){
  try{
    const r = await fetch("/api/reporte-firmar?id="+encodeURIComponent(id)+"&t="+encodeURIComponent(t));
    const d = await r.json();
    if(!d.ok) throw new Error(d.error||("HTTP "+r.status));
    REP = d.report; pinta(REP);
    if(d.yaFirmado || (REP.firma && REP.firma.imagen)){
      $("yaFirmado").style.display="block";
      $("yaFirmado").textContent = "✍️ Reporte firmado" + (REP.firma&&REP.firma.firmante?(" por "+REP.firma.firmante):"") + " y archivado. Puede descargar el PDF con el botón de arriba.";
      $("topStatus").textContent = "Reporte "+(REP.folio||"")+" · firmado";
    } else if (d.puedeFirmar) {
      $("firmaCard").style.display="block"; setTimeout(fit, 80);
      $("topStatus").textContent = "Reporte "+(REP.folio||"")+" · listo para firma";
    } else {
      $("topStatus").textContent = "Reporte "+(REP.folio||"")+" · pendiente de validación (solo vista)";
    }
  }catch(e){ $("topStatus").className="status err"; $("topStatus").textContent="✗ "+(e.message||e); }
}

/* Escalar la hoja carta al ancho de la pantalla (igual que el portal) */
function fitPreview(){
  const stage=$("stage"), pv=$("preview"); if(!stage||!pv) return;
  pv.style.width="816px"; pv.style.transform="none"; pv.style.margin="0 auto";
  const avail=stage.clientWidth, W=816;
  if(avail<W){ const s=avail/W; pv.style.transformOrigin="top left"; pv.style.transform="scale("+s+")"; pv.style.margin="0"; stage.style.overflow="hidden"; stage.style.height=(pv.scrollHeight*s)+"px"; }
  else { stage.style.height=""; stage.style.overflow=""; }
}
let _rsz; window.addEventListener("resize", ()=>{ clearTimeout(_rsz); _rsz=setTimeout(fitPreview,120); });

/* ===== Pad de firma ===== */
const cv = $("pad"); const ctx = cv.getContext("2d");
let trazo=false, hayFirma=false;
function fit(){ const r=cv.getBoundingClientRect(); if(!r.width) return;
  cv.width=r.width*2; cv.height=r.height*2; ctx.scale(2,2); ctx.lineWidth=2.2; ctx.lineCap="round"; ctx.strokeStyle="#1b2138"; }
window.addEventListener("resize", ()=>setTimeout(fit,60));
const pos = (e)=>{ const r=cv.getBoundingClientRect(); const q=e.touches?e.touches[0]:e; return {x:q.clientX-r.left, y:q.clientY-r.top}; };
function down(e){ e.preventDefault(); trazo=true; const q=pos(e); ctx.beginPath(); ctx.moveTo(q.x,q.y); }
function move(e){ if(!trazo) return; e.preventDefault(); const q=pos(e); ctx.lineTo(q.x,q.y); ctx.stroke(); hayFirma=true; $("firmar").disabled=false; }
function up(){ trazo=false; }
cv.addEventListener("mousedown",down); cv.addEventListener("mousemove",move); window.addEventListener("mouseup",up);
cv.addEventListener("touchstart",down,{passive:false}); cv.addEventListener("touchmove",move,{passive:false}); cv.addEventListener("touchend",up);
$("limpiar").addEventListener("click",()=>{ ctx.clearRect(0,0,cv.width,cv.height); fit(); hayFirma=false; $("firmar").disabled=true; });

$("firmar").addEventListener("click", async ()=>{
  if(!hayFirma) return;
  $("firmar").disabled=true; $("st").className="status"; $("st").textContent="Archivando…";
  try{
    const firma = cv.toDataURL("image/png");
    const firmante = $("firmante").value.trim();
    const r = await fetch("/api/reporte-firmar", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ id, t, firma, firmante }) });
    const d = await r.json();
    if(!d.ok) throw new Error(d.error||("HTTP "+r.status));
    REP.firma = { imagen: firma, firmante }; pinta(REP);
    $("firmaCard").style.display="none";
    $("yaFirmado").style.display="block";
    $("yaFirmado").textContent = "✅ Reporte firmado y archivado. Puede descargar el PDF con el botón de arriba.";
    window.scrollTo({top:0, behavior:"smooth"});
  }catch(e){ $("st").className="status err"; $("st").textContent="✗ "+(e.message||e); $("firmar").disabled=false; }
});

$("pdf").addEventListener("click", ()=>window.print());
cargar();
</script>
</body>
</html>
